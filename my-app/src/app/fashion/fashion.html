<h2>FASHION PRODUCTS</h2>
<div *ngIf="cartMessage" class="alert alert-success">{{ cartMessage }}</div>
<div *ngIf="errMessage" class="alert alert-danger">{{ errMessage }}</div>

<div class="row">
  <div class="col-md-4 mb-4" *ngFor="let fashion of fashions">
    <div class="card h-100">
      <img [src]="fashion.fashion_image" class="card-img-top" style="height: 200px; object-fit: cover;">
      <div class="card-body">
        <h5 class="card-title">{{ fashion.fashion_subject }}</h5>
        <p class="card-text">{{ fashion.fashion_detail }}</p>
        <p class="text-primary fw-bold">${{ fashion.fashion_price || 0 }}</p>
      </div>
      <div class="card-footer d-flex justify-content-between">
        <button class="btn btn-info btn-sm" (click)="addToCart(fashion)">ADD TO CART</button>
        <a [routerLink]="['/fashion', fashion._id]" class="btn btn-outline-secondary btn-sm">View Detail</a>
      </div>
    </div>
  </div>
</div>

<div class="mt-3">
  <a routerLink="/shopping-cart" class="btn btn-primary">View Shopping Cart</a>
</div>
