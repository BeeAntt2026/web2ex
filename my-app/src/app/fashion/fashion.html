<h2>Fashion Website</h2>
<p style="color:red">{{errMessage}}</p>

<!-- Tìm kiếm theo Style (yêu cầu trang 115) -->
<div style="margin-bottom:16px;">
  <label><b>Tìm theo Style: </b></label>
  <select [(ngModel)]="selectedStyle" (change)="filterByStyle()"
          style="padding:6px; margin-right:8px;">
    <option value="">-- Tất cả --</option>
    <option *ngFor="let s of styles" [value]="s">{{s}}</option>
  </select>
</div>

<!-- Hiển thị Fashion dạng lưới theo nhóm (yêu cầu trang 115) -->
<div style="display:flex; flex-wrap:wrap; gap:16px;">
  <div *ngFor="let fashion of fashions"
       style="width:200px; border:1px solid #ddd;
              border-radius:8px; padding:10px; cursor:pointer;"
       routerLink="/fashion/{{fashion._id}}">
    <img src="{{fashion.thumbnail}}" width="180px" height="180px"
         style="object-fit:cover; border-radius:4px;"
         onerror="this.src=''">
    <p style="font-weight:bold; margin:8px 0 4px;">{{fashion.fashion_title}}</p>
    <p style="color:#888; font-size:13px;">{{fashion.style}}</p>
  </div>
</div>
