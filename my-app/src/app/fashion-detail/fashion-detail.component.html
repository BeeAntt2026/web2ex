<h2>Fashion Detail</h2>

<p style="color: red;">{{errMessage}}</p>

<div>
  <label><strong>Fashion ID: </strong></label>
  <input type="text" [(ngModel)]="fashionId" placeholder="Nhập Fashion ID" size="30">
  <button (click)="searchFashion()">Search</button>
</div>

<a routerLink="/fashion" class="back-link">← Back to Fashion List</a>

<div *ngIf="fashion" style="margin-top: 16px;">
  <table border="1" style="border-collapse: collapse;">
    <tr>
      <td><strong>Fashion Id:</strong></td>
      <td>{{fashion._id}}</td>
    </tr>
    <tr>
      <td><strong>Fashion Subject:</strong></td>
      <td>{{fashion.fashion_subject}}</td>
    </tr>
    <tr>
      <td><strong>Fashion Detail:</strong></td>
      <td>{{fashion.fashion_detail}}</td>
    </tr>
    <tr>
      <td><strong>Image:</strong></td>
      <td>
        <img src="{{fashion.fashion_image}}" width="150px" height="150px" alt="fashion image">
      </td>
    </tr>
  </table>
</div>
