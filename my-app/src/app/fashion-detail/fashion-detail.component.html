<div *ngIf="fashion">
  <h2>{{fashion.fashion_title}}</h2>
  <p>Style: <b>{{fashion.style}}</b></p>
  <p>Ngày tạo: {{fashion.created_date | date:'dd/MM/yyyy'}}</p>

  <img src="{{fashion.thumbnail}}" width="300px" height="300px"
       style="object-fit:cover; border-radius:8px;"
       onerror="this.src=''">

  <!-- Render HTML từ WYSIWYG editor (yêu cầu trang 115) -->
  <div style="margin-top:16px; line-height:1.6;"
       [innerHTML]="fashion.fashion_detail">
  </div>

  <br>
  <button (click)="goBack()"
          style="padding:8px 16px;">← Quay lại</button>
</div>

<div *ngIf="errMessage">
  <p style="color:red">{{errMessage}}</p>
  <button (click)="goBack()">← Quay lại</button>
</div>
