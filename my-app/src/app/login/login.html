<div class="container mt-4">
  <div class="card" style="width: 22rem;">
    <div class="card-header">Login System</div>
    <div class="card-body">
      <div class="mb-3">
        <label for="username" class="form-label">User Name:</label>
        <input type="text" class="form-control" id="username"
          [(ngModel)]="username" name="username" placeholder="Enter username">
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password:</label>
        <input type="password" class="form-control" id="password"
          [(ngModel)]="password" name="password" placeholder="Enter password">
      </div>
      <button class="btn btn-primary" (click)="login()">Login</button>
      <div *ngIf="message" class="mt-3 alert alert-info">{{ message }}</div>
    </div>
  </div>
</div>
