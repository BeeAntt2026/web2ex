<div class="container">
  <!-- Header -->
  <div class="page-header">
    <h4>💎 Jewelry Collection</h4>
  </div>
  
  <div class="d-flex justify-content-center mb-4">
    <button class="btn-cart" (click)="goToCart()">
      🛒 View Shopping Cart
    </button>
  </div>

  <!-- Toast thông báo -->
  <div *ngIf="toastMsg" class="toast-notification">
    ✨ {{ toastMsg }}
  </div>

  <!-- Product Grid -->
  <div class="product-grid">
    <div class="product-card" *ngFor="let p of products">
      
      <!-- Image -->
      <div class="product-image-wrapper">
        <img [src]="p.image"
             class="product-image"
             onerror="this.onerror=null; this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22180%22 height=%22180%22><rect fill=%22%23f8f5f0%22 width=%22180%22 height=%22180%22/><text x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%23d4af37%22 font-size=%2214%22>💍 No Image</text></svg>'"
             [alt]="p.name">
      </div>

      <!-- Product Info -->
      <div class="product-info">
        <p class="product-name">{{ p.name }}</p>
        
        <!-- Star Rating -->
        <div class="star-rating">
          <span class="filled">★</span>
          <span class="filled">★</span>
          <span class="filled">★</span>
          <span class="filled">★</span>
          <span>☆</span>
        </div>

        <!-- Price -->
        <p class="product-price">${{ p.price.toFixed(2) }}</p>

        <!-- Action Buttons -->
        <div class="action-buttons">
          <button class="btn-add-cart" (click)="addToCart(p)">
            Add to Cart
          </button>
          <button class="btn-icon" title="Quick View">👁</button>
          <button class="btn-icon wishlist" title="Add to Wishlist">♡</button>
        </div>
      </div>
      
    </div>
  </div>
</div>
