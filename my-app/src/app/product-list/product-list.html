<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4>Danh sách sản phẩm</h4>
    <button class="btn btn-success" (click)="goToCart()">🛒 Xem giỏ hàng</button>
  </div>

  <!-- Toast thông báo -->
  <div *ngIf="toastMsg" class="alert alert-success alert-dismissible">
    {{ toastMsg }}
  </div>

  <div class="row">
    <div class="col-md-4 mb-4" *ngFor="let p of products">
      <div class="card h-100 shadow-sm text-center">

        <img [src]="'assets/images/' + p.image"
             class="card-img-top mx-auto mt-3"
             style="width: 160px; height: 160px; object-fit: contain;"
             onerror="this.src='https://via.placeholder.com/160x160?text=Ring'"
             [alt]="p.name">

        <div class="card-body d-flex flex-column">
          <p class="text-primary small fw-bold">{{ p.name }}</p>

          <!-- Star rating tĩnh -->
          <div class="text-warning mb-1">☆ ☆ ☆ ☆ ☆</div>

          <p class="fw-bold mb-3">${{ p.price.toFixed(2) }}</p>

          <div class="d-flex gap-2 mt-auto">
            <button class="btn btn-info text-white flex-grow-1"
                    (click)="addToCart(p)">
              ADD TO CART
            </button>
            <button class="btn btn-outline-secondary">📋</button>
            <button class="btn btn-outline-danger">♡</button>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
