<div class="cart-container">
  <!-- Header -->
  <div class="cart-header">
    <h2>🛒 Shopping Cart</h2>
  </div>

  <!-- Alert Message -->
  <div *ngIf="msg" class="cart-alert">
    ✨ {{ msg }}
  </div>

  <!-- Giỏ trống -->
  <div *ngIf="cartItems.length === 0" class="empty-cart">
    <div class="empty-cart-icon">💍</div>
    <h5>Your cart is empty</h5>
    <p>Discover our stunning jewelry collection</p>
    <button class="btn-shop" (click)="continueShopping()">
      ✨ Start Shopping
    </button>
  </div>

  <!-- Bảng giỏ hàng -->
  <div class="cart-table-wrapper" *ngIf="cartItems.length > 0">
    <table class="cart-table">
      <thead>
        <tr>
          <th style="width: 60px;">Remove</th>
          <th style="width: 80px;">SKU</th>
          <th style="width: 90px;">Image</th>
          <th>Product</th>
          <th style="width: 100px;">Price</th>
          <th style="width: 90px;">Qty</th>
          <th style="width: 110px;">Total</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of cartItems"
            [class.item-checked]="item.checked">
          <td class="text-center">
            <input type="checkbox" 
                   class="remove-checkbox"
                   [(ngModel)]="item.checked">
          </td>
          <td class="text-center">
            <span class="sku-text">{{ item.sku || '—' }}</span>
          </td>
          <td class="text-center">
            <img [src]="item.image"
                 class="product-thumb"
                 onerror="this.onerror=null; this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2270%22 height=%2270%22><rect fill=%22%23f8f5f0%22 width=%2270%22 height=%2270%22 rx=%2210%22/><text x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%23d4af37%22 font-size=%2220%22>💍</text></svg>'"
                 [alt]="item.name">
          </td>
          <td>
            <span class="product-name">{{ item.name }}</span>
          </td>
          <td class="text-center">
            <span class="price-text">${{ (item.price || 0).toFixed(2) }}</span>
          </td>
          <td class="text-center">
            <input type="number"
                   [(ngModel)]="item.quantity"
                   min="1" max="99"
                   class="qty-input"
                   [disabled]="item.checked">
          </td>
          <td class="text-center">
            <span class="total-text">${{ lineTotal(item).toFixed(2) }}</span>
          </td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <td colspan="6" class="text-end">
            <span class="grand-total-label">Grand Total:</span>
          </td>
          <td class="text-center">
            <span class="grand-total-value">${{ cartTotal().toFixed(2) }}</span>
          </td>
        </tr>
      </tfoot>
    </table>
  </div>

  <!-- Nút hành động -->
  <div class="cart-actions" *ngIf="cartItems.length > 0">
    <button class="btn-continue" (click)="continueShopping()">
      ← Continue Shopping
    </button>
    <button class="btn-update" (click)="updateCart()">
      Update Cart ✓
    </button>
  </div>
</div>
